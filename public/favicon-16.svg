<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="bg16" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="16" height="16" rx="3.5" fill="url(#bg16)"/>
  <!-- At 16px: simplified — just 2 bold rows, no checkmark detail -->
  <!-- Row 1: done circle (filled) -->
  <circle cx="4.5" cy="5.5" r="1.8" fill="#a78bfa"/>
  <rect x="7.5" y="4.5" width="5.5" height="2" rx="1" fill="#ffffff" opacity="0.4"/>
  <!-- Row 2: active (bright) -->
  <circle cx="4.5" cy="10.5" r="1.8" fill="#ffffff"/>
  <rect x="7.5" y="9.5" width="5.5" height="2" rx="1" fill="#ffffff" opacity="0.85"/>
</svg>
