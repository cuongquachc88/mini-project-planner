<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg32" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="shine32" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg32)"/>
  <rect width="32" height="16" rx="7" fill="url(#shine32)"/>
  <!-- Row 1: done — filled circle, no checkmark (too small at 32px) -->
  <circle cx="9.5" cy="10.5" r="2.8" fill="#a78bfa"/>
  <rect x="14" y="9.25" width="11" height="2.5" rx="1.25" fill="#ffffff" opacity="0.38"/>
  <!-- Row 2: active — solid white circle, bright bar -->
  <circle cx="9.5" cy="16" r="2.8" fill="#ffffff"/>
  <rect x="14" y="14.75" width="11" height="2.5" rx="1.25" fill="#ffffff" opacity="0.82"/>
  <!-- Row 3: todo — outline circle, short dim bar -->
  <circle cx="9.5" cy="21.5" r="2.8" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.38"/>
  <rect x="14" y="20.25" width="7.5" height="2.5" rx="1.25" fill="#ffffff" opacity="0.3"/>
</svg>
